<div class="page-wrapper">
  <div class="form-card">
    <h2 class="form-title">Change Password</h2>

    <form #pwForm="ngForm" (ngSubmit)="onSubmit(pwForm)" novalidate>
      <div class="field">
        <label for="currentPassword">Current Password</label>
        <input
          id="currentPassword"
          type="password"
          name="currentPassword"
          [(ngModel)]="formData.currentPassword"
          required
          minlength="6"
          #currentPwd="ngModel"
          placeholder="Enter current password"
        />
        <span class="field-error" *ngIf="currentPwd.invalid && currentPwd.touched">
          Current password is required (min 6 characters).
        </span>
      </div>

      <div class="field">
        <label for="newPassword">New Password</label>
        <input
          id="newPassword"
          type="password"
          name="newPassword"
          [(ngModel)]="formData.newPassword"
          required
          minlength="6"
          #newPwd="ngModel"
          placeholder="Enter new password"
        />
        <span class="field-error" *ngIf="newPwd.invalid && newPwd.touched">
          New password is required (min 6 characters).
        </span>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm New Password</label>
        <input
          id="confirmPassword"
          type="password"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          #confirmPwd="ngModel"
          placeholder="Re-enter new password"
        />
        <span class="field-error" *ngIf="confirmPwd.invalid && confirmPwd.touched">
          Please confirm your new password.
        </span>
      </div>

      <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="submit-btn" [disabled]="pwForm.invalid || isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Change Password' }}
      </button>
    </form>
  </div>
</div>
